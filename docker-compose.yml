services:
  # PostgreSQL для agent-service
  agent-postgres:
    image: postgres:15-alpine
    container_name: agent-postgres
    env_file:
      - ./agent-service/.env
    volumes:
      - agent_postgres_data:/var/lib/postgresql/data
    networks:
      - agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis для agent-service
  agent-redis:
    image: redis:7-alpine
    container_name: agent-redis
    volumes:
      - agent_redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Agent Service (с postgres и redis)
  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: agent-service
    env_file:
      - ./agent-service/.env
    environment:
      POSTGRES_HOST: agent-postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: agent-redis
      REDIS_PORT: 6379
    ports:
      - "8001:8000"
    depends_on:
      agent-postgres:
        condition: service_healthy
      agent-redis:
        condition: service_healthy
    networks:
      - agent-network
      - rag-network
    restart: unless-stopped

  # Qdrant векторная БД для rag-service
  rag-qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - rag_qdrant_data:/qdrant/storage
    networks:
      - rag-network
    restart: unless-stopped

  # RAG Service (с qdrant)
  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: rag-service
    env_file:
      - ./rag-service/.env
    environment:
      QDRANT_HOST: rag-qdrant
      QDRANT_PORT: 6333
    ports:
      - "8002:8000"
    depends_on:
      - rag-qdrant
    networks:
      - rag-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    env_file:
      - ./api-gateway/.env
    environment:
      AGENT_SERVICE_URL: http://agent-service:8000
      RAG_SERVICE_URL: http://rag-service:8000
    ports:
      - "8000:8000"
    depends_on:
      - agent-service
      - rag-service
    networks:
      - rag-network
    restart: unless-stopped

  # Telegram Bot
  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: telegram-bot
    env_file:
      - ./telegram-bot/.env
    environment:
      API_GATEWAY_URL: http://api-gateway:8000
    depends_on:
      - api-gateway
    networks:
      - rag-network
    restart: unless-stopped

volumes:
  agent_postgres_data:
  agent_redis_data:
  rag_qdrant_data:

networks:
  agent-network:
    driver: bridge
  rag-network:
    driver: bridge