<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Профиль администратора</title>
  <link rel="stylesheet" href="/static/css/chat_history.css">
  <style>
    .profile-page {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.08);
    }
    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .profile-header h2 { margin: 0; font-size: 20px; }
    .profile-compact-avatar img { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; border: 2px solid #e2e8f0; }
    .profile-body { margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 12px; }
    .profile-body p { margin: 0; font-size: 15px; color: #334155; }
    .profile-body .label { font-weight: 700; color: #0f172a; margin-right: 8px; }
    .small-mono { font-family: 'Monaco','Courier New',monospace; color: #1e40af; }
  </style>
</head>
<body>
  <div class="profile-page">
    <div class="profile-header">
      <h2>Профиль администратора</h2>
      <div class="profile-compact-avatar">
        <img id="profilePageAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%234f46e5'/%3E%3Ctext x='50' y='60' font-size='50' fill='white' text-anchor='middle' font-weight='bold'%3EA%3C/text%3E%3C/svg%3E" alt="Avatar">
      </div>
    </div>

    <div class="profile-body">
      <p><span class="label">Email:</span> <span id="profilePageEmail">—</span></p>
      <p><span class="label">API Key (masked):</span> <span id="profilePageApiKey" class="small-mono">—</span></p>
      <p><span class="label">API Key SHA256:</span> <span id="profilePageApiHash" class="small-mono">—</span></p>
    </div>
  </div>

  <script>
    function toHex(buffer) {
      return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    (async function fillProfile(){
      try {
        const user = JSON.parse(localStorage.getItem('user')||'null');
        if (!user) { window.location.href='/ui/login'; return; }
        document.getElementById('profilePageEmail').textContent = user.email || '—';
        const keyEl = document.getElementById('profilePageApiKey');
        keyEl.textContent = (user.api_key||'').substring(0,12) + '...';
        if (user.api_key) {
          const enc = new TextEncoder().encode(user.api_key);
          const hash = await crypto.subtle.digest('SHA-256', enc);
          document.getElementById('profilePageApiHash').textContent = toHex(hash);
        }
        // avatar initial
        const avatar = document.getElementById('profilePageAvatar');
        const initial = (user.email||'A')[0].toUpperCase();
        avatar.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%234f46e5'/%3E%3Ctext x='50' y='60' font-size='50' fill='white' text-anchor='middle' font-weight='bold'%3E${encodeURIComponent(initial)}%3C/text%3E%3C/svg%3E`;
      } catch(e) { console.error(e); }
    })();
  </script>
</body>
</html>
